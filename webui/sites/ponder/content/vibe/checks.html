<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Checkbox Game</title>
        <style>
          body { font-family: sans-serif; }
          #grid {
            display: grid;
            grid-template-columns: repeat(40, 22px);
            gap: 2px;
            margin-top: 10px;
          }
          .cell {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
          }
          .red {
            background: #f88;
          }
        </style>
    </head>
    <body>
        <div>unchecking a box checks the boxes immediately below it and to its right</div>
        <div>if either of those neighbors is already checked, you can't uncheck the box until they're cleared out</div>
        <div>your goal is to uncheck all the checkboxes in the red box :)</div>
        <div id="mode">Mode: Normal</div>
        <div>Moves: <span id="moves">0</span></div>
        <button id="reset">Reset</button>
        <span>
        <span>Change difficulty:</span>
        <button id="mode_easy">Easy</button>
        <button id="mode_norm">Normal</button>
        <button id="mode_hard">Hard</button>
        </span>
        <span id="hint"></span>

        <div id="grid"></div>

        <script>
            const SIZE = 40;
            let RED_LIMIT = 4;

            const gridEl = document.getElementById("grid");
            const movesEl = document.getElementById("moves");
            const hintEl = document.getElementById("hint");

            let state;
            let moves;
            let resets = 0;

            const modeLabel = { 3: "Easy", 4: "Normal", 5: "Hard (Warning: Hard mode is *really* hard)" };

            function modeSwitch(n) {
              RED_LIMIT = n;
              document.getElementById("mode").innerText = `Mode: ${modeLabel[RED_LIMIT]}`;
            }

            function initState() {
              state = Array.from({ length: SIZE }, () =>
                Array.from({ length: SIZE }, () => false)
              );
              state[0][0] = true;
              moves = 0;
              movesEl.textContent = moves;
              hintEl.textContent = "";
            }

            function canUncheck(i, j) {
              if (i + 1 < SIZE && state[i + 1][j]) return false;
              if (j + 1 < SIZE && state[i][j + 1]) return false;
              return true;
            }

            function render() {
              gridEl.innerHTML = "";

              for (let n = 0; n < SIZE; n++) {
                for (let m = 0; m < SIZE; m++) {
                  const wrapper = document.createElement("div");
                  wrapper.className = "cell";
                  if (n < RED_LIMIT && m < RED_LIMIT) {
                    wrapper.classList.add("red");
                  }

                  const cb = document.createElement("input");
                  cb.type = "checkbox";
                  cb.checked = state[n][m];
                  cb.dataset.n = n;
                  cb.dataset.m = m;

                  cb.addEventListener("change", (e) => {
                    const i = +e.target.dataset.n;
                    const j = +e.target.dataset.m;

                    if (!state[i][j]) {
                      e.target.checked = false;
                      return;
                    }

                    if (!canUncheck(i, j)) {
                      e.target.checked = true;
                      return;
                    }

                    state[i][j] = false;

                    if (i + 1 < SIZE) state[i + 1][j] = true;
                    if (j + 1 < SIZE) state[i][j + 1] = true;

                    moves++;
                    movesEl.textContent = moves;

                    if (moves > 4 && RED_LIMIT == 5 && resets > 25) {
                      hintEl.textContent = `(maybe try normal mode?)`;
                    }
                    if (moves > 4 && RED_LIMIT == 4 && resets > 25) {
                      hintEl.textContent = `(... maybe try easy mode?)`;
                    }
                    if (moves > 20 && resets > 30) {
                      hintEl.textContent = `(hint: it is mathematically impossible to win on this difficulty)`;
                    }

                    render();
                  });

                  wrapper.appendChild(cb);
                  gridEl.appendChild(wrapper);
                }
              }
            }

            document.getElementById("reset").addEventListener("click", () => {
              initState();
              render();
              resets += 1;
            });

            document.getElementById("mode_hard").addEventListener("click", () => {
              modeSwitch(5);
              initState();
              render();
              resets = 0;
            });

            document.getElementById("mode_norm").addEventListener("click", () => {
              modeSwitch(4);
              initState();
              render();
              resets = 0;
            });

            document.getElementById("mode_easy").addEventListener("click", () => {
              modeSwitch(3);
              initState();
              render();
              resets = 0;
            });

            initState();
            render();
        </script>

    </body>
</html>
