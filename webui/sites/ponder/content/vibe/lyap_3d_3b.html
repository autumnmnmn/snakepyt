<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyapunov Point Cloud</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            pointer-events: none;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        p { margin: 0; font-size: 14px; color: #ccc; }
    </style>
    <!-- Three.js + OrbitControls + dat.gui -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>

<div id="ui-layer">
    <h1>Lyapunov Point Cloud</h1>
    <p>Millions of points cached seamlessly via GPGPU textures.</p>
</div>

<!-- ================= COMPUTE SHADERS ================= -->
<script type="x-shader/x-vertex" id="computeVertexShader">
    void main() {
        gl_Position = vec4(position, 1.0);
    }
</script>

<script type="x-shader/x-fragment" id="computeFragmentShader">
    precision highp float;

    uniform float u_zoom;
    uniform vec2 u_center;
    uniform int u_iterations;
    uniform int u_seq_mask;
    uniform int u_seq_len;
    uniform float u_x0;
    uniform int u_offset;
    uniform float u_resolution;

    out vec4 fragColor;

    void main() {
        vec2 uv = gl_FragCoord.xy / u_resolution;
        vec2 r_vals = u_center + (uv - 0.5) * u_zoom;

        float x = u_x0;
        float lyapunov = 0.0;
        int valid_iters = 0;

        for (int iter = 0; iter < 500; iter++) {
            if (iter >= u_iterations) break;

            int seq_idx = (iter + u_offset) % u_seq_len;
            int bit = (u_seq_mask >> seq_idx) & 1;
            float r = (bit == 1) ? r_vals.y : r_vals.x;

            float x_next = r * x * (1.0 - x);
            float deriv = r * (1.0 - 2.0 * x);

            //if (abs(x_next) > 10.0) {
            //    lyapunov = -10.0; 
            //    break;
            //}

            if (iter > 10) {
                lyapunov += log(abs(deriv) + 1e-8);
                valid_iters++;
            }
            x = x_next;
        }

        if (valid_iters > 0 /* && lyapunov > -9.0 */) {
            lyapunov /= float(valid_iters);
        }

        fragColor = vec4(lyapunov, 0.0, 0.0, 1.0); // Output computed value to cache texture
    }
</script>


<!-- ================= DISPLAY SHADERS ================= -->
<script type="x-shader/x-vertex" id="displayVertexShader">
    uniform sampler2D u_dataTexture;
    uniform float u_zScale;
    uniform float u_zScaleNeg;
    uniform float u_pointSize;

    out float v_lyapunov;

    void main() {
        // Read the precomputed lyapunov exponent instead of re-evaluating 500 loops
        vec4 data = texture(u_dataTexture, uv);
        float lyapunov = data.x;
        v_lyapunov = lyapunov;

        // Displace the vertex Z coordinate based on the exponent
        //float z = clamp(lyapunov, -2.0, 1.0) * u_zScale;
        float z = 0.0;
        if (lyapunov >= 0.0) {
            z = lyapunov * u_zScale;
        } else {
            z = lyapunov * u_zScaleNeg;
        }

        vec3 newPos = vec3(position.x, position.y, position.z + z);

        vec4 mvPosition = modelViewMatrix * vec4(newPos, 1.0);
        gl_Position = projectionMatrix * mvPosition;
        
        // Perspective point sizing
        gl_PointSize = u_pointSize * (15.0 / -mvPosition.z);
    }
</script>

<script type="x-shader/x-fragment" id="displayFragmentShader">
    precision highp float;

    uniform int u_offset;
    uniform float u_opacity;
    in float v_lyapunov;
    
    out vec4 fragColor;

    void main() {
        // Shape the point into a soft circle instead of a harsh square
        vec2 ptC = gl_PointCoord - vec2(0.5);
        float dist = length(ptC);
        if(dist > 0.5) discard;

        int off = u_offset % 6;
        vec3 color;

        // Colors per sequence offset
        if (off == 0) color = vec3(1.0, 0.2, 0.2);       // Red
        else if (off == 1) color = vec3(0.2, 1.0, 0.2);  // Green
        else if (off == 2) color = vec3(0.2, 0.5, 1.0);  // Blue
        else if (off == 3) color = vec3(1.0, 1.0, 0.2);  // Yellow
        else if (off == 4) color = vec3(1.0, 0.2, 1.0);  // Magenta
        else color = vec3(0.2, 1.0, 1.0);                // Cyan

        float alpha = u_opacity * (1.0 - (dist * 2.0)); // Soft edges

        // Color intensity based on stability / chaos
        if (v_lyapunov > 0.0) {
            color = mix(color, vec3(1.0), clamp(v_lyapunov, 0.0, 1.0) * 0.8);
            alpha *= 1.2; // chaotic points glow brighter
        } else {
            float blend = exp(v_lyapunov * 1.5); 
            color = mix(vec3(0.0), color, blend);
            alpha *= blend; // fade out deeply stable points
        }

        // Hide heavily invalid/escaped points entirely
        if (v_lyapunov <= -9.0) {
            discard;
        }

        fragColor = vec4(color, alpha);
    }
</script>

<script>
    let scene, camera, renderer, controls, pointGroup;
    let baseGeometry;
    let computeScene, computeCamera, computeMesh, computeMaterial;
    let renderTargets = [];

    // Default configuration
    const params = {
        sequence: 'AB',
        iterations: 150,
        x0: 0.5,
        zoom: 1.2,
        centerX: 3.4,
        centerY: 3.4,
        zScale: 1.5,
        zScaleNeg: 0.1,
        resolution: 512, // Safe up to 2048 now!
        pointSize: 2.5,
        opacity: 0.6
    };

    init();

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.04);

        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 7);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true; 
        controls.autoRotateSpeed = 0.5;

        initCompute();

        const gridHelper = new THREE.GridHelper(8, 16, 0x333333, 0x111111);
        gridHelper.position.y = -3.0; 
        scene.add(gridHelper);

        pointGroup = new THREE.Group();
        scene.add(pointGroup);

        buildGeometry();
        doCompute();
        rebuildPoints();
        setupGUI();

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function initCompute() {
        // Fullscreen setup for pure offscreen shader calculations
        computeScene = new THREE.Scene();
        computeCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        
        computeMaterial = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('computeVertexShader').textContent,
            fragmentShader: document.getElementById('computeFragmentShader').textContent,
            glslVersion: THREE.GLSL3,
            uniforms: {
                u_zoom: { value: params.zoom },
                u_center: { value: new THREE.Vector2(params.centerX, params.centerY) },
                u_iterations: { value: params.iterations },
                u_seq_mask: { value: 0 },
                u_seq_len: { value: 1 },
                u_x0: { value: params.x0 },
                u_offset: { value: 0 },
                u_resolution: { value: params.resolution }
            }
        });

        computeMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), computeMaterial);
        computeScene.add(computeMesh);
    }

    function getRenderTarget(resolution) {
        return new THREE.WebGLRenderTarget(resolution, resolution, {
            minFilter: THREE.NearestFilter,
            magFilter: THREE.NearestFilter,
            format: THREE.RGBAFormat,
            type: THREE.FloatType, // Store exponent safely
            depthBuffer: false,
            stencilBuffer: false,
            generateMipmaps: false
        });
    }

    function buildGeometry() {
        if (baseGeometry) baseGeometry.dispose();
        
        const N = params.resolution;
        baseGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(N * N * 3);
        const uvs = new Float32Array(N * N * 2);
        
        for (let y = 0; y < N; y++) {
            for (let x = 0; x < N; x++) {
                const idx = y * N + x;
                const uvx = (x + 0.5) / N;
                const uvy = (y + 0.5) / N;
                
                uvs[idx * 2] = uvx;
                uvs[idx * 2 + 1] = uvy;
                
                // Align vertex exactly with GPGPU texture coordinates
                positions[idx * 3] = (uvx - 0.5) * 8.0;
                positions[idx * 3 + 1] = (uvy - 0.5) * 8.0;
                positions[idx * 3 + 2] = 0.0;
            }
        }
        
        baseGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        baseGeometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    }

    function parseSequence(seq) {
        let mask = 0;
        const len = seq.length;
        for (let i = 0; i < len; i++) {
            if (seq[i].toUpperCase() === 'B') {
                mask |= (1 << i);
            }
        }
        return { mask, len };
    }

    // Single trigger function that bakes the calculations whenever modified
    function doCompute() {
        const { mask, len } = parseSequence(params.sequence);
        if (len === 0) return false;

        let targetsChanged = false;

        // Dispose mismatched resolution targets
        for (let i = renderTargets.length - 1; i >= 0; i--) {
            if (renderTargets[i].width !== params.resolution) {
                renderTargets[i].dispose();
                renderTargets.splice(i, 1);
                targetsChanged = true;
            }
        }

        // Accommodate sequence length bounds
        while (renderTargets.length < len) {
            renderTargets.push(getRenderTarget(params.resolution));
            targetsChanged = true;
        }
        
        while (renderTargets.length > len) {
            const rt = renderTargets.pop();
            rt.dispose();
            targetsChanged = true;
        }

        // Apply Compute Layout Uniforms
        computeMaterial.uniforms.u_zoom.value = params.zoom;
        computeMaterial.uniforms.u_center.value.set(params.centerX, params.centerY);
        computeMaterial.uniforms.u_iterations.value = params.iterations;
        computeMaterial.uniforms.u_seq_mask.value = mask;
        computeMaterial.uniforms.u_seq_len.value = len;
        computeMaterial.uniforms.u_x0.value = params.x0;
        computeMaterial.uniforms.u_resolution.value = params.resolution;

        // Render pass for each shift in the loop parameter
        for (let i = 0; i < len; i++) {
            computeMaterial.uniforms.u_offset.value = i;
            renderer.setRenderTarget(renderTargets[i]);
            renderer.render(computeScene, computeCamera);
        }
        renderer.setRenderTarget(null);

        return targetsChanged;
    }

    function rebuildPoints() {
        while (pointGroup.children.length > 0) {
            const child = pointGroup.children[0];
            child.material.dispose();
            pointGroup.remove(child);
        }

        const len = renderTargets.length;
        if (len === 0) return;

        for (let offset = 0; offset < len; offset++) {
            const material = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('displayVertexShader').textContent,
                fragmentShader: document.getElementById('displayFragmentShader').textContent,
                glslVersion: THREE.GLSL3, 
                transparent: true,
                depthWrite: false, 
                blending: THREE.AdditiveBlending, 
                uniforms: {
                    u_dataTexture: { value: renderTargets[offset].texture },
                    u_zScale: { value: params.zScale },
                    u_zScaleNeg: { value: params.zScaleNeg },
                    u_pointSize: { value: params.pointSize },
                    u_opacity: { value: params.opacity },
                    u_offset: { value: offset }
                }
            });

            const points = new THREE.Points(baseGeometry, material);
            points.rotation.x = -Math.PI / 2;
            points.position.y = offset * 0.005; 
            points.frustumCulled = false; // Displaced entirely via vertex logic limits generic culling
            pointGroup.add(points);
        }
    }

    function onComputeParamsChange() {
        const targetsChanged = doCompute();
        if (targetsChanged) {
            rebuildPoints(); // Only swap out display points if textures changed sizes 
        }
    }

    function onDisplayParamsChange() {
        pointGroup.children.forEach(points => {
            points.material.uniforms.u_zScale.value = params.zScale;
            points.material.uniforms.u_zScaleNeg.value = params.zScaleNeg;
            points.material.uniforms.u_pointSize.value = params.pointSize;
            points.material.uniforms.u_opacity.value = params.opacity;
        });
    }

    function setupGUI() {
        const gui = new dat.GUI({ width: 320 });

        gui.add(params, 'sequence').name('Sequence').onFinishChange(val => {
            params.sequence = val.toUpperCase().replace(/[^AB]/g, '');
            if(params.sequence === '') params.sequence = 'A';
            gui.updateDisplay();
            onComputeParamsChange();
        });

        // Trigger updates exclusively when parameter variables slide
        gui.add(params, 'iterations', 20, 500).step(1).onChange(onComputeParamsChange);
        gui.add(params, 'x0', 0.0, 1.0).onChange(onComputeParamsChange);

        const viewFolder = gui.addFolder('Camera & Parameter Mapping');
        viewFolder.add(params, 'zoom', 0.1, 8.0).onChange(onComputeParamsChange);
        viewFolder.add(params, 'centerX', 0.0, 4.0).onChange(onComputeParamsChange);
        viewFolder.add(params, 'centerY', 0.0, 4.0).onChange(onComputeParamsChange);
        viewFolder.add(params, 'zScale', 0.1, 5.0).onChange(onDisplayParamsChange);
        viewFolder.add(params, 'zScaleNeg', 0.1, 5.0).onChange(onDisplayParamsChange);
        viewFolder.open();

        const pFolder = gui.addFolder('Point Cloud Settings');
        pFolder.add(params, 'pointSize', 0.1, 15.0).name('Point Size').onChange(onDisplayParamsChange);
        pFolder.add(params, 'opacity', 0.01, 1.0).name('Opacity').onChange(onDisplayParamsChange);
        pFolder.add(params, 'resolution', [512, 1024, 2048, 4096]).name('Grid Density').onChange(val => {
            params.resolution = parseInt(val);
            buildGeometry();
            onComputeParamsChange();
        });
        pFolder.open();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
